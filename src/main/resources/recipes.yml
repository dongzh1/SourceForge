# 源质锻造配方表。
# 键 = 蓝图的 CraftEngine 物品 id（用 /ce give 给玩家蓝图）。
# 锻造时：把蓝图放进锻造界面的蓝图槽，材料从玩家背包按 CE id 自动扣除。
# 产出 = 一件已存在的 SF 装备（equipment），等级固定 = tier，无随机词条（强度来自 MOD 系统）。
# 结构模式下实际耗时 = round(time-seconds * 20 / 外壳速度倍率)。
recipes:
  sourceforge:blueprint_short_sword:
    equipment: short_sword
    tier: 1
    time-seconds: 60
    materials:
