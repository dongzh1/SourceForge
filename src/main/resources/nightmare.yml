# 梦魇MOD 配置：词条为每个物品实例随机生成（存于物品 PDC，不在此文件）。
material: "minecraft:paper"
goal-kills: 50
base-cost: 18
negative-chance: 0.5
negative-cost-reduction: 6
positive-count:
  min: 2
  max: 3
# 每武器类别的可 roll 词条池；min/max 是正属性区间；neg-min/neg-max 可选(负属性区间，绝对值)。
