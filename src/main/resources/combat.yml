# SourceForge 战斗抗性与元素克制配置
#
# MythicMobs 推荐接入方式：在怪物 Skills 里明确添加 scoreboard tag。
# 示例:
# Skills:
#   - command{c="tag <mob.uuid> add sf_profile:wood_creature";asConsole=true} @self ~onSpawn
# SourceForge 只按 sf_profile、profile.tags、entity-types 匹配怪物档案，不按怪物名字猜测抗性。
#
# 抗性写法:
# physical-resistance: 0.35 表示受到物理伤害减少 35%
# magic-resistance: 0.25 表示受到非元素魔法伤害减少 25%
# element-resistances.fire: -25.0 表示受到火元素伤害增加 25%
# 元素伤害只读取对应元素抗性，不再叠加 magic-resistance。
# 元素抗性使用百分制，25.0 表示抵抗 25%，120.0 表示免疫并治疗原伤害的 20%。
# true-damage-scale: 真实伤害全局削弱倍率，避免真实伤害过强
#
# 原版伤害接管规则:
# 原版护甲值 = 物理防御，原版护甲韧性 = 法术防御。
# 火焰、闪电等带元素的伤害只吃对应元素抗性；爆炸、魔法、龙息、凋零、音爆等非元素魔法伤害吃法术防御。
# 摔落、撞墙、窒息、溺水、饥饿、虚空、世界边界、致命指令等按真实伤害结算。
# 其他伤害类型默认按物理伤害结算。
# 怪物档案可通过 attack-type 指定该怪物造成的普通攻击类型:
# attack-type: physical|magic|element|true
# attack-element: fire|ice|lightning|water|wood|none，仅 attack-type: element 时使用。

true-damage-scale: 0.45
default-monster-profile: default

element-absorb:
  max-heal-per-hit: 10.0

element-reactions:
  fire:
    wood: 1.35
    ice: 1.20
    water: 0.70
    fire: 0.45
  ice:
    fire: 0.75
    water: 1.20
    lightning: 1.10
    ice: 0.45
  lightning:
    water: 1.30
    metal: 1.15
    lightning: 0.45
  water:
    fire: 1.25
    lightning: 0.85
    water: 0.45
  wood:
    water: 1.15
    earth: 1.10
    fire: 0.65
    wood: 0.45

monster-profiles:
  default:
    display-name: "默认怪物"
    tags:
      - "sf_profile:default"
    entity-types: []
    name-contains: []
    elements: []
    attack-type: physical
    attack-element: none
    physical-resistance: 0.0
    magic-resistance: 0.0
    element-resistances: {}

  physical_guard:
    display-name: "高物抗守卫"
    tags:
      - "sf_profile:physical_guard"
    entity-types: []
    name-contains: []
    elements:
      - metal
    attack-type: physical
    attack-element: none
    physical-resistance: 0.45
    magic-resistance: 0.05
    element-resistances:
      lightning: -10.0

  mage_guard:
    display-name: "高法抗术士"
    tags:
      - "sf_profile:mage_guard"
    entity-types: []
    name-contains: []
    elements:
      - arcane
    attack-type: magic
    attack-element: none
    physical-resistance: 0.05
    magic-resistance: 0.45
    element-resistances:
      fire: 15.0
      ice: 15.0
      lightning: 15.0
      wood: 15.0

  wood_creature:
    display-name: "木系怪物"
    tags:
      - "sf_profile:wood_creature"
    entity-types: []
    name-contains: []
    elements:
      - wood
    attack-type: element
    attack-element: wood
    physical-resistance: 0.10
    magic-resistance: 0.05
    element-resistances:
      fire: -25.0
      wood: 45.0
      water: 20.0

  fire_creature:
    display-name: "火系怪物"
    tags:
      - "sf_profile:fire_creature"
    entity-types:
      - blaze
      - magma_cube
    name-contains: []
    elements:
      - fire
    attack-type: element
    attack-element: fire
    physical-resistance: 0.05
    magic-resistance: 0.05
    element-resistances:
      fire: 60.0
      water: -25.0
      ice: -10.0

  ice_creature:
    display-name: "冰系怪物"
    tags:
      - "sf_profile:ice_creature"
    entity-types:
      - stray
    name-contains: []
    elements:
      - ice
    attack-type: element
    attack-element: ice
    physical-resistance: 0.05
    magic-resistance: 0.05
    element-resistances:
      ice: 60.0
      fire: -20.0

  water_creature:
    display-name: "水系怪物"
    tags:
      - "sf_profile:water_creature"
    entity-types:
      - drowned
      - guardian
      - elder_guardian
    name-contains: []
    elements:
      - water
    attack-type: element
    attack-element: water
    physical-resistance: 0.05
    magic-resistance: 0.05
    element-resistances:
      water: 55.0
      lightning: -25.0
      ice: -10.0
