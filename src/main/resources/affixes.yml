# SourceForge 属性配置 v2
#
# 12 属性系统
# ============
# 战斗属性:
#   base_damage     - 基础伤害，提升所有类型伤害
#   critical_chance - 暴击几率
#   critical_damage - 暴击伤害倍率
#   status_chance   - 触发几率，提升异常状态概率
#   armor           - 护甲值，提升伤害减免
#
# 生存属性:
#   health          - 生命值，增加生命上限
#   shield_capacity - 护盾容量，常驻生命提升
#
# 能量/技能属性:
#   energy_max        - 能量上限
#   ability_strength  - 技能强度，提升技能伤害/治疗
#   ability_duration  - 技能持续时间
#   ability_efficiency - 技能效率，降低能量消耗
#   ability_range     - 技能范围
#
# 字段说明:
#   display-name: 词条显示名
#   pdc-key: PDC 键名
#   value-type: double / int
#   min/max: 默认数值范围
#   decimals: lore 小数位
#   combat: 属性分类（用于评分和战斗系统）
#   scale: 锻造缩放系数
#   lore: 装备 lore 显示

affixes:
  base_damage:
    display-name: "基础伤害"
    pdc-key: "base_damage"
    value-type: double
    min: 1.0
    max: 3.0
    decimals: 1
    combat: base_damage
    scale: 1.0
    lore: "&7武力: &f+%value%"

  critical_chance:
    display-name: "暴击几率"
    pdc-key: "critical_chance"
    value-type: double
    min: 0.03
    max: 0.10
    decimals: 2
    combat: critical_chance
    scale: 1.0
    lore: "&7会心: &f+%value%"

  critical_damage:
    display-name: "暴击伤害"
    pdc-key: "critical_damage"
    value-type: double
    min: 0.20
    max: 0.60
    decimals: 2
    combat: critical_damage
    scale: 1.0
    lore: "&7破势: &f+%value%"

  status_chance:
    display-name: "触发"
    pdc-key: "status_chance"
    value-type: double
    min: 0.05
    max: 0.20
    decimals: 2
    combat: status_chance
    scale: 1.0
    lore: "&7触发: &f+%value%"

  armor:
    display-name: "护甲"
    pdc-key: "armor"
    value-type: double
    min: 2.0
    max: 8.0
    decimals: 0
    combat: armor
    scale: 1.0
    lore: "&7护甲: &f+%value%"

  health:
    display-name: "生命"
    pdc-key: "health"
    value-type: double
    min: 2.0
    max: 8.0
    decimals: 0
    combat: health
    scale: 1.0
    lore: "&7生命: &f+%value%"

  shield_capacity:
    display-name: "护盾"
    pdc-key: "shield_capacity"
    value-type: double
    min: 2.0
    max: 8.0
    decimals: 0
    combat: shield_capacity
    scale: 1.0
    lore: "&7护盾: &f+%value%"

  energy_max:
    display-name: "能量"
    pdc-key: "energy_max"
    value-type: double
    min: 5.0
    max: 20.0
    decimals: 0
    combat: energy_max
    scale: 1.0
    lore: "&7能量: &f+%value%"

  ability_strength:
    display-name: "强度"
    pdc-key: "ability_strength"
    value-type: double
    min: 0.03
    max: 0.12
    decimals: 2
    combat: ability_strength
    scale: 1.0
    lore: "&7强度: &f+%value%"

  ability_duration:
    display-name: "持续"
    pdc-key: "ability_duration"
    value-type: double
    min: 0.03
    max: 0.12
    decimals: 2
    combat: ability_duration
    scale: 1.0
    lore: "&7持续: &f+%value%"

  ability_efficiency:
    display-name: "效率"
    pdc-key: "ability_efficiency"
    value-type: double
    min: 0.03
    max: 0.12
    decimals: 2
    combat: ability_efficiency
    scale: 1.0
    lore: "&7效率: &f+%value%"

  ability_range:
    display-name: "范围"
    pdc-key: "ability_range"
    value-type: double
    min: 0.03
    max: 0.12
    decimals: 2
    combat: ability_range
    scale: 1.0
    lore: "&7范围: &f+%value%"

  # ===== 元素属性（与 status_chance 联动，详见 elements.yml）=====
  # 数值故意偏小：装备/MOD 提供一点元素值，命中按 status_chance 触发对应元素异常并叠层。
  heat_damage:
    display-name: "火元素"
    pdc-key: "heat_damage"
    value-type: double
    min: 0.5
    max: 2.0
    decimals: 1
    combat: elemental
    scale: 1.0
    lore: "&7火: &c+%value%"

  cold_damage:
    display-name: "冰元素"
    pdc-key: "cold_damage"
    value-type: double
    min: 0.5
    max: 2.0
    decimals: 1
    combat: elemental
    scale: 1.0
    lore: "&7冰: &b+%value%"

  toxin_damage:
    display-name: "毒元素"
    pdc-key: "toxin_damage"
    value-type: double
    min: 0.5
    max: 2.0
    decimals: 1
    combat: elemental
    scale: 1.0
    lore: "&7毒: &a+%value%"

  electric_damage:
    display-name: "电元素"
    pdc-key: "electric_damage"
    value-type: double
    min: 0.5
    max: 2.0
    decimals: 1
    combat: elemental
    scale: 1.0
    lore: "&7电: &e+%value%"
