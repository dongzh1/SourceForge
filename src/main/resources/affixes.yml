# SourceForge 词条配置
#
# 字段说明:
# display-name: 词条显示名
# pdc-key: 写入装备 PDC 的键名，战斗结算会读取这些键
# value-type: double / int / string
# min/max: 词条默认数值范围，材料或等级词条没有写有效范围时会作为兜底
# decimals: lore 中显示的小数位
# chance: 预留字段；当前锻造概率主要写在 config.yml 的 tier-affixes 和 materials/*.yml
# combat: 当前支持 damage / pierce / crit_chance / crit_damage / poison / burn / slow / true_damage / physical_resistance / magic_resistance / dodge_chance
# damage-type: physical / magic / true。带 element 的 magic 伤害属于元素伤害，只读取对应元素抗性。
# element: none / fire / ice / lightning / water / wood。none 表示非元素。
# melee/ranged: 同一个词条在近战和远程下可以有不同锻造结果。scale 会在锻造时乘到最终写入装备的数值上，lore 和实战一致。
# status-chance: 元素词条附带的原版状态概率。状态只是附加效果，主要伤害来自词条数值。
# effects: 更细的武器覆盖，优先级为 武器ID_模式 > 武器ID > 武器分类_模式 > 武器分类 > melee/ranged。
# 可用示例: dagger_melee、longsword_melee、spear_ranged、source_bow_ranged、source_crossbow_ranged、flintlock_ranged。
# lore: 写入装备 lore 的显示文本，支持 %name% 和 %value%

affixes:
  # 直接增加基础伤害，适合前期和所有近战武器。
  attack_damage:
    display-name: "锐锋"
    pdc-key: "attack_damage"
    value-type: double
    min: 1.0
    max: 3.0
    decimals: 1
    chance: 5
    combat: damage
    melee:
      combat: damage
      damage-type: physical
      element: none
      scale: 1.0
    ranged:
      combat: damage
      damage-type: physical
      element: none
      scale: 0.75
    effects:
      dagger_melee:
        combat: damage
        scale: 0.85
      short_sword_melee:
        combat: damage
        scale: 1.0
      longsword_melee:
        combat: damage
        scale: 1.15
      spear_melee:
        combat: damage
        scale: 1.05
      spear_ranged:
        combat: damage
        scale: 0.70
      source_bow_ranged:
        combat: damage
        scale: 0.70
      source_crossbow_ranged:
        combat: damage
        scale: 0.85
      flintlock_ranged:
        combat: damage
        scale: 1.25
    lore: "&7锐锋: &f攻击伤害 +%value%"
  # 物理基础伤害，装备本体默认输出来源。
  physical_damage:
    display-name: "武力"
    pdc-key: "physical_damage"
