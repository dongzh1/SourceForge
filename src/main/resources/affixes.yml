      element: none
      scale: 0.75
    effects:
      dagger_melee:
        combat: physical_damage
        scale: 0.85
      short_sword_melee:
        combat: physical_damage
        scale: 1.0
      longsword_melee:
        combat: physical_damage
        scale: 1.18
      spear_melee:
        combat: physical_damage
        scale: 1.05
      spear_ranged:
        combat: physical_damage
        scale: 0.70
      source_bow_ranged:
        combat: physical_damage
        scale: 0.70
      source_crossbow_ranged:
