gui:
  # 锻造界面的纯文字标题回退：仅当 forge_gui.yml 的 title 为空串 "" 时使用。
  title: "&0源质锻造"

# 锻造界面布局已迁移到专用文件 forge_gui.yml（首次启用时自动生成于插件数据目录）。
# 槽位、按钮三态外观（material/name/lore，支持完整 MiniMessage 含 <image>/<shift>/<gradient>）、
# 背景图标题等全部在 forge_gui.yml 中配置。本文件不再有 forge-ui 段。

debug:
  combat: false

# 附魔台抽奖（右键附魔台打开抽奖界面，放入空白 MOD + 消耗经验抽取随机 MOD）
# required-bookshelves: 打开界面所需的环绕书架数（类似原版顶级附魔台）；在附魔台周围 5×5 外圈、上下两层统计书架。设 0 关闭此限制。
lottery:
  xp-cost: 30
  required-bookshelves: 16

# BetterHud 集成：每次 MM 技能进入冷却时弹出一个 popup（按技能名堆叠，最多由
# BetterHud 端 max-stack 控制）。CD 结束时由本插件主动移除。
# popup 布局里可用的条目变量（通过 BetterHud 的 (custom_variable:键) 读取）：
#   skill          技能内部名（建议配合自定义字体显示）
#   cooldown       冷却秒数（一位小数）
#   cooldown_ticks 冷却总 tick（用于自定义进度条）
betterhud:
  enabled: true
  skill-cd-popup: "sourceforge_skill_cd"
  # 坐标追踪导航 popup 名（/sf track 使用）。布局可用的条目变量见 docs。
  navigator-popup: "sourceforge_navigator"
  # 推送 popup 的全链路诊断日志（getPopup/getHudPlayer/show 各步骤打到控制台）。
  # 也可用 /sf debug betterhud on 临时开启。
  debug: false

forge:
  guarantee-material-affix: true

# 源质锻炉多方块结构（3×3×3 空心立方，核心居中，26 个外壳同层级）
# 锻造时长 ticks = round(base-time-seconds * (层级序号*per-tier + base) / 外壳倍率 * 20)
forge-structure:
  enabled: true
  base-time-seconds: 10
  tier-weight:
    base: 0.5
    per-tier: 0.5
  core-block: "sourceforge:forge_core"
  # 外壳层级 -> CE 方块 id（声明顺序即层级序号 1..4）
  shell-blocks:
    iron: "sourceforge:forge_shell_iron"
    gold: "sourceforge:forge_shell_gold"
    diamond: "sourceforge:forge_shell_diamond"
    netherite: "sourceforge:forge_shell_netherite"
  # 外壳层级 -> 速度倍率
  shell-multipliers:
    iron: 1.0
    gold: 1.5
    diamond: 2.0
    netherite: 3.0
  hammer: "sourceforge:forge_hammer"

mods:
  gui-title: "&0源质改造"
  capacity:
    melee_light: {base: 30, tier-increment: 10}
    melee_heavy: {base: 30, tier-increment: 10}
    polearm: {base: 30, tier-increment: 10}
    bow: {base: 30, tier-increment: 10}
