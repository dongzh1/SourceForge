  # ============================================================
  # 属性测试装备（CraftEngine 物品库，每件隔离单一属性，数值夸张）
  # 发放: /sf giveequipment <玩家> <装备ID> 1 1 12
  # 全部用 tier '1'，chance=1.0，min=max 固定值，保证每次结果一致
  # ============================================================

  # ---------- 武器（手持攻击；debug.combat=true 时聊天栏打印战斗数值）----------
  test_base_damage:
    display-name: '&c① 武力测试剑'
    material: NETHERITE_SWORD
    ce-id: sourceforge:test_base_damage
    weapon-category: melee_light
    effective-slots:
    - mainhand
    chunkworld-level: '0'
    pixelshop-price: 0.0
    base-lore:
    - '&7测试: base_damage = 50（每次命中约 50）'
    affixes:
