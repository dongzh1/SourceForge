items:
  sourceforge:blueprint_short_sword:
    material: paper
    data:
      item-name: "<!i><blue>蓝图: 短剑"
    texture: sourceforge:item/blueprint_short_sword

  sourceforge:short_sword:
    material: iron_sword
    data:
      item-name: "<!i><white>短剑"
      unbreakable: true
    texture: sourceforge:item/short_sword
    events:
      - on: left_click
        functions:
          - { type: cancel_event }
          - { type: mythic_mobs_skill, skill: SF_KJ_LIGHT, power: 1 }
          - { type: mythic_mobs_skill, skill: GD_NO1, power: 1 }
          - { type: mythic_mobs_skill, skill: SF_CK, power: 1 }
      - on: right_click
        conditions:
          - { type: hand, hand: main_hand }
        functions:
          - { type: cancel_event }
          - { type: mythic_mobs_skill, skill: GD, power: 1 }
          - { type: mythic_mobs_skill, skill: GD_check, power: 1 }

